<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter & Tagesplan App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Wetter & Tagesplan</h1>
            <p class="subtitle">Dein persönlicher Wetter-Assistent</p>
        </header>

        <!-- Suchbereich -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Stadt eingeben..." autocomplete="off">
                <button id="searchBtn" class="btn btn-primary">Suchen</button>
                <button id="locationBtn" class="btn btn-secondary" title="Meinen Standort verwenden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                    </svg>
                </button>
            </div>
            <div class="unit-toggle">
                <button id="celsiusBtn" class="unit-btn active">°C</button>
                <button id="fahrenheitBtn" class="unit-btn">°F</button>
            </div>
        </section>

        <!-- Ladezustand -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Wetterdaten werden geladen...</p>
        </div>

        <!-- Fehleranzeige -->
        <div id="errorMessage" class="error-message hidden">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <span id="errorText">Fehler aufgetreten</span>
        </div>

        <!-- Hauptwetteranzeige -->
        <section id="weatherSection" class="weather-section hidden">
            <div class="current-weather">
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Wetter-Icon" class="weather-icon">
                    <div class="weather-info">
                        <h2 id="cityName">--</h2>
                        <p id="weatherDate" class="date"></p>
                        <p id="temperature" class="temperature">--°</p>
                        <p id="weatherDescription" class="description">--</p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2c-5.33 4-8 7.5-8 11a8 8 0 0016 0c0-3.5-2.67-7-8-11zm0 18c-3.87 0-7-3.13-7-7 0-3.01 2.35-6.01 7-10.01 4.65 4 7 7 7 10.01 0 3.87-3.13 7-7 7z"/>
                        </svg>
                        <div>
                            <span class="label">Luftfeuchtigkeit</span>
                            <span id="humidity" class="value">--%</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M14.5 17c0 1.65-1.35 3-3 3s-3-1.35-3-3c0-1.65 1.35-3 3-3s3 1.35 3 3zm-3-15c-4.42 0-8 3.58-8 8 0 1.85.63 3.55 1.69 4.9l1.43-1.43C6.04 12.5 5.5 11.31 5.5 10c0-3.31 2.69-6 6-6s6 2.69 6 6c0 1.31-.54 2.5-1.38 3.38l1.43 1.43c.98-1.2 1.95-2.82 1.95-4.81 0-4.42-3.58-8-8-8z"/>
                        </svg>
                        <div>
                            <span class="label">Wind</span>
                            <span id="wind" class="value">-- km/h</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                        </svg>
                        <div>
                            <span class="label">Gefühlt</span>
                            <span id="feelsLike" class="value">--°</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tagesempfehlungen -->
            <div class="recommendations">
                <h3>Tagesempfehlungen</h3>
                <div id="recommendationsList" class="recommendations-list">
                    <!-- Empfehlungen werden dynamisch eingefügt -->
                </div>
            </div>

            <!-- 5-Tage-Vorhersage -->
            <div class="forecast">
                <h3>5-Tage-Vorhersage</h3>
                <div id="forecastList" class="forecast-list">
                    <!-- Vorhersage-Karten werden dynamisch eingefügt -->
                </div>
            </div>
        </section>
    </div>

    <footer>
        <p>Wetterdaten von <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo API</a></p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
